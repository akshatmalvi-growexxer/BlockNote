services:
  - type: web
    name: blocknote-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: WEB_APP_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: blocknote-postgres
          property: connectionString

databases:
  - name: blocknote-postgres
    databaseName: blocknote
    user: blocknote
